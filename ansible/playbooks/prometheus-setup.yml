---
- name: Intall Prometheus
  hosts: lab_servers
  become: yes
  vars:
    monitoring_path: /opt/monitoring
    prometheus_path: "{{ monitoring_path }}/prometheus"

    prometheus_version: "v2.51.0"
    node_exporter_version: "v1.7.0"
    cadvisor_version: "v0.60.5"
    grafana_version: "13.1.1"
   


  tasks:
    - name: Create monitoring directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: '0755'
      loop:
        - "{{ monitoring_path }}"
        - "{{ prometheus_path }}"
    
    - name: Create prometheus config
      ansible.builtin.copy:
        dest: "{{ prometheus_path }}/prometheus.yml"
        content: |
          global:
            scrape_interval: 15s
          scrape_configs:
            - job_name: 'prometheus'
              static_configs:
                - targets: ['localhost:9090']
            - job_name: 'node-exporter'
              static_configs:
                - targets: ['node-exporter:9100']
            - job_name: 'cadvisor'
              static_configs:
                - targets: ['cadvisor:8080']
        mode: '0644'

    - name: Create docker-compose file for monitoring
      ansible.builtin.copy:
        dest: "{{ monitoring_path }}/docker-compose.yml"
        content: |
          services:
            prometheus:
              image: prom/prometheus:{{ prometheus_version }}
              container_name: prometheus
              ports:
                - "9090:9090"
              volumes:
                - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
                - prometheus_data:/prometheus
              command:
                - '--config.file=/etc/prometheus/prometheus.yml'
                - '--storage.tsdb.path=/prometheus'
                - '--web.enable-lifecycle'
              restart: unless-stopped

            node-exporter:
              image: prom/node-exporter:{{ node_exporter_version }}
              container_name: node-exporter
              ports:
                - "9100:9100"
              volumes:
                - /proc:/host/proc:ro
                - /sys:/host/sys:ro
                - /:/rootfs:ro
              command:
                - '--path.procfs=/host/proc'
                - '--path.rootfs=/rootfs'
                - '--path.sysfs=/host/sys'
                - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
              restart: unless-stopped

            cadvisor:
              image: ghcr.io/google/cadvisor:{{ cadvisor_version }}
              container_name: cadvisor
              ports:
                - "8080:8080"
              volumes:
                - /:/rootfs:ro
                - /var/run:/var/run:ro
                - /sys:/sys:ro
                - /var/lib/docker/:/var/lib/docker:ro
                - /dev/disk/:/dev/disk:ro
              privileged: true
              devices:
                - /dev/kmsg
              restart: unless-stopped  
            
            grafana:
              image: grafana/grafana:{{ grafana_version }}
              container_name: grafana
              ports:
                - "3000:3000"
              volumes:
                - grafana_data:/var/lib/grafana
              environment:
                - GF_SECURITY_ADMIN_PASSWORD={{ grafana_admin_password }}
              restart: unless-stopped

          volumes:
            prometheus_data:
            grafana_data:
        mode: '0644'
         
    - name: Deploy monitoring stack using Docker Compose module
      community.docker.docker_compose_v2:
        project_src: "{{ monitoring_path }}"
        state: present
        pull: missing
      register: docker_compose_result

    - name: Show deployment result
      ansible.builtin.debug:
        msg: "Stack deployed successfully. Containers changed: {{ docker_compose_result.changed }}"
